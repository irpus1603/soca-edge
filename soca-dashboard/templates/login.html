<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOCA Dashboard — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-sm bg-base-100 shadow-xl">
    <div class="card-body">
      <div class="flex flex-col items-center mb-4">
        <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-primary-content" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.868v6.264a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold">SOCA Dashboard</h1>
        <p class="text-sm opacity-60 mt-1">Sign in to continue</p>
      </div>

      {% if messages %}
        {% for msg in messages %}
        <div role="alert" class="alert alert-error mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>{{ msg }}</span>
        </div>
        {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
        {% csrf_token %}
        <div class="form-control mb-3">
          <label class="label"><span class="label-text">Username</span></label>
          <input type="text" name="username" placeholder="Enter username" class="input input-bordered w-full" required autofocus />
        </div>
        <div class="form-control mb-5">
          <label class="label"><span class="label-text">Password</span></label>
          <input type="password" name="password" placeholder="Enter password" class="input input-bordered w-full" required />
        </div>
        <button type="submit" class="btn btn-primary w-full">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
